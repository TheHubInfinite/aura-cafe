<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | AURA Coffee</title>
    <!-- External Links -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #967E76;
            --bg: #FDFCF8;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--primary); overflow-x: hidden; }

        /* NAVIGATION */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: var(--white); border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 2px; text-decoration: none; color: black; font-weight: bold; }
        .back-link { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: var(--accent); }

        /* MENU HEADER */
        .menu-header { text-align: center; padding: 80px 0; background: #f9f6f0; }
        .menu-header h1 { font-family: 'Playfair Display'; font-size: 3.5rem; margin-bottom: 10px; }
        .menu-header p { color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; font-weight: 600; }

        /* PRODUCT GRID */
        .container { width: 85%; margin: 50px auto; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 40px;
        }

        .product-card {
            background: var(--white); padding: 20px; border-radius: 15px;
            text-align: center; transition: 0.4s; border: 1px solid #f0f0f0;
            overflow: hidden;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        .img-container { width: 100%; height: 300px; overflow: hidden; border-radius: 12px; margin-bottom: 20px; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .product-card:hover img { scale: 1.1; }

        .product-card h3 { font-family: 'Playfair Display'; font-size: 1.4rem; margin-bottom: 10px; }
        .product-desc { font-size: 0.85rem; color: #777; line-height: 1.6; }

        footer { text-align: center; padding: 60px; color: #999; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <nav>
        <a href="infinite.html" class="logo">AURA.</a>
        <a href="infinite.html" class="back-link">← BACK TO HOME</a>
    </nav>

    <header class="menu-header">
        <p>Experience Quality</p>
        <h1>Our Collection</h1>
    </header>

    <div class="container">
        <div class="product-grid" id="menu-container">
            <!-- Items generated by menu.js -->
        </div>
    </div>

    <footer>© 2024 AURA COFFEE — CRAFTED WITH PASSION</footer>

    <script src="menu.js"></script>
</body>
</html>
